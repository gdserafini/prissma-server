security:
  jwt:
    secret: prissma-secret-key-change-in-production
    expiration: 86400000
  password-reset:
    frontend-url: http://localhost:3000

spring:
  application:
    name: prissma-server
  datasource:
    url: jdbc:postgresql://localhost:5432/prissma
    username: prissma
    password: prissma
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
